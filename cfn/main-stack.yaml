AWSTemplateFormatVersion: '2010-09-09'
Description: >
  EBS Outpost Disk Monitoring — Fargate, HTTPS + Cognito auth.
  Use this template once you have an ACM certificate for your internal domain.
  Replaces the HTTP-only template with full login, admin/readonly roles, session management.

Parameters:

  MonitoringBucket:
    Type: String
    Default: outposts-ebs-storage-monitoring

  AdminEmail:
    Type: String
    AllowedPattern: ".+@.+"
    Description: First admin user — receives temporary password by email

  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, staging, dev]

  VpcId:
    Type: AWS::EC2::VPC::Id

  PrivateSubnet1Id:
    Type: AWS::EC2::Subnet::Id

  PrivateSubnet2Id:
    Type: AWS::EC2::Subnet::Id

  InternalCidr:
    Type: String
    Default: "10.0.0.0/8"
    Description: Only this CIDR can reach the ALB

  DashboardDomain:
    Type: String
    Description: Your internal domain e.g. ebs-monitor.yourcompany.com

  AcmCertificateArn:
    Type: String
    Description: ACM certificate ARN for DashboardDomain

  AggregationSchedule:
    Type: String
    Default: "cron(0 12 * * ? *)"

  ApiCpu:
    Type: Number
    Default: 256
    AllowedValues: [256, 512, 1024]

  ApiMemory:
    Type: Number
    Default: 512
    AllowedValues: [512, 1024, 2048]

  AggCpu:
    Type: Number
    Default: 512

  AggMemory:
    Type: Number
    Default: 1024

  ExistingEcrRepositoryUri:
    Type: String
    Description: Existing ECR repository URI, for example 123456789012.dkr.ecr.us-east-1.amazonaws.com/ebs-monitoring-prod

  ExistingEcrRepositoryArn:
    Type: String
    Description: Existing ECR repository ARN used for automatic ECS redeploy on image push

  DeployImageTag:
    Type: String
    Default: latest
    Description: Image tag used by ECS tasks and watched for automatic redeploy


Resources:

  # ── Security Groups ───────────────────────────────────────────────────────

  AlbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "ebs-monitoring-alb-${Environment}"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref InternalCidr
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref InternalCidr
      Tags:
        - Key: Name
          Value: !Sub "ebs-monitoring-alb-${Environment}"

  FargateSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "ebs-monitoring-fargate-${Environment}"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref AlbSg
      Tags:
        - Key: Name
          Value: !Sub "ebs-monitoring-fargate-${Environment}"


  # ── Cognito ───────────────────────────────────────────────────────────────

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "ebs-monitoring-${Environment}"
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        InviteMessageTemplate:
          EmailSubject: "Your EBS Monitoring dashboard access"
          EmailMessage: |
            Hi {username},
            You have been given access to the EBS Outpost Disk Monitoring dashboard.
            Your temporary password is: {####}
            Sign in at: https://{DashboardDomain}
      MfaConfiguration: "OFF"

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: ebs-admins
      UserPoolId: !Ref UserPool
      Description: Full access — can trigger manual aggregation refresh

  ReadOnlyGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: ebs-readonly
      UserPoolId: !Ref UserPool
      Description: View only — cannot trigger refresh

  CognitoDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "ebs-mon-${AWS::AccountId}"
      UserPoolId: !Ref UserPool

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "ebs-alb-${Environment}"
      UserPoolId: !Ref UserPool
      GenerateSecret: true
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, email, profile]
      AllowedOAuthFlowsUserPoolClient: true
      SupportedIdentityProviders: [COGNITO]
      CallbackURLs:
        - !Sub "https://${DashboardDomain}/oauth2/idpresponse"
      LogoutURLs:
        - !Sub "https://${DashboardDomain}/"
      AccessTokenValidity: 8
      IdTokenValidity: 8
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  AdminUser:
    Type: AWS::Cognito::UserPoolUser
    Properties:
      UserPoolId: !Ref UserPool
      Username: !Ref AdminEmail
      DesiredDeliveryMediums: [EMAIL]
      UserAttributes:
        - Name: email
          Value: !Ref AdminEmail
        - Name: email_verified
          Value: "true"

  AdminUserGroupAttach:
    Type: AWS::Cognito::UserPoolUserToGroupAttachment
    DependsOn: AdminUser
    Properties:
      UserPoolId: !Ref UserPool
      GroupName: !Ref AdminGroup
      Username: !Ref AdminEmail


  # ── ALB (internal, HTTPS + Cognito) ──────────────────────────────────────

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "ebs-monitoring-${Environment}"
      Scheme: internal
      Type: application
      Subnets:
        - !Ref PrivateSubnet1Id
        - !Ref PrivateSubnet2Id
      SecurityGroups:
        - !Ref AlbSg

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "ebs-api-${Environment}"
      Protocol: HTTP
      Port: 8080
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"

  ALBHTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

  ALBHTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Protocol: HTTPS
      Port: 443
      Certificates:
        - CertificateArn: !Ref AcmCertificateArn
      DefaultActions:
        - Type: authenticate-cognito
          Order: 1
          AuthenticateCognitoConfig:
            UserPoolArn: !GetAtt UserPool.Arn
            UserPoolClientId: !Ref UserPoolClient
            UserPoolDomain: !Sub "ebs-mon-${AWS::AccountId}"
            OnUnauthenticatedRequest: authenticate
            SessionTimeout: 28800
        - Type: forward
          Order: 2
          TargetGroupArn: !Ref ALBTargetGroup


  # ── ECS ───────────────────────────────────────────────────────────────────

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "ebs-monitoring-${Environment}"
      CapacityProviders: [FARGATE, FARGATE_SPOT]
      ClusterSettings:
        - Name: containerInsights
          Value: enabled


  # ── IAM ───────────────────────────────────────────────────────────────────

  TaskExecRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ebs-task-exec-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  ApiTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ebs-api-task-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ReadSummary
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub "arn:aws:s3:::${MonitoringBucket}/summary.json"
        - PolicyName: RunAggTask
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ecs:RunTask
                Resource: !Ref AggTaskDef
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt TaskExecRole.Arn
                  - !GetAtt AggTaskRole.Arn

  AggTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ebs-agg-task-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3ReadWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutObject
                Resource:
                  - !Sub "arn:aws:s3:::${MonitoringBucket}"
                  - !Sub "arn:aws:s3:::${MonitoringBucket}/*"

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ebs-eventbridge-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RunECSTask
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ecs:RunTask
                Resource: !Ref AggTaskDef
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt TaskExecRole.Arn
                  - !GetAtt AggTaskRole.Arn

  EcrDeployLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ebs-ecr-deploy-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: UpdateApiService
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecs:UpdateService
                  - ecs:DescribeServices
                Resource: !Sub "arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:service/ebs-monitoring-${Environment}/ebs-api-${Environment}"
              - Effect: Allow
                Action: ecs:DescribeClusters
                Resource: !GetAtt ECSCluster.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"


  # ── CloudWatch Logs ───────────────────────────────────────────────────────

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/ebs-api-${Environment}"
      RetentionInDays: 30

  AggLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/ebs-agg-${Environment}"
      RetentionInDays: 30

  EcrDeployLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/ebs-ecr-deploy-${Environment}"
      RetentionInDays: 30


  # ── Task Definitions ──────────────────────────────────────────────────────

  ApiTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "ebs-api-${Environment}"
      Cpu: !Ref ApiCpu
      Memory: !Ref ApiMemory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt TaskExecRole.Arn
      TaskRoleArn: !GetAtt ApiTaskRole.Arn
      ContainerDefinitions:
        - Name: api
          Image: !Sub "${ExistingEcrRepositoryUri}:${DeployImageTag}"
          PortMappings:
            - ContainerPort: 8080
          Environment:
            - Name: MONITORING_BUCKET
              Value: !Ref MonitoringBucket
            - Name: SUMMARY_KEY
              Value: summary.json
            - Name: ECS_CLUSTER
              Value: !Ref ECSCluster
            - Name: AGGREGATOR_TASK_DEF
              Value: !Ref AggTaskDef
            - Name: TASK_SUBNETS
              Value: !Sub "${PrivateSubnet1Id},${PrivateSubnet2Id}"
            - Name: TASK_SECURITY_GROUPS
              Value: !Ref FargateSg
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ApiLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: api
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -sf http://localhost:8080/api/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3

  AggTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "ebs-agg-${Environment}"
      Cpu: !Ref AggCpu
      Memory: !Ref AggMemory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt TaskExecRole.Arn
      TaskRoleArn: !GetAtt AggTaskRole.Arn
      ContainerDefinitions:
        - Name: aggregator
          Image: !Sub "${ExistingEcrRepositoryUri}:${DeployImageTag}"
          Command:
            - python
            - aggregator.py
          Environment:
            - Name: MONITORING_BUCKET
              Value: !Ref MonitoringBucket
            - Name: SUMMARY_KEY
              Value: summary.json
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref AggLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: agg

  EcrDeployFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "ebs-ecr-deploy-${Environment}"
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt EcrDeployLambdaRole.Arn
      Environment:
        Variables:
          ECS_CLUSTER: !Ref ECSCluster
          ECS_SERVICE: !Sub "ebs-api-${Environment}"
      Code:
        ZipFile: |
          import boto3
          import os

          ecs = boto3.client("ecs")

          def handler(event, context):
              detail = event.get("detail", {})
              if detail.get("action-type") != "PUSH" or detail.get("result") != "SUCCESS":
                  return {"ignored": True, "event": detail}

              response = ecs.update_service(
                  cluster=os.environ["ECS_CLUSTER"],
                  service=os.environ["ECS_SERVICE"],
                  forceNewDeployment=True,
              )
              return {
                  "updated": True,
                  "service": response["service"]["serviceName"],
                  "event": detail,
              }


  # ── ECS Service ───────────────────────────────────────────────────────────

  ApiService:
    Type: AWS::ECS::Service
    DependsOn: ALBHTTPSListener
    Properties:
      ServiceName: !Sub "ebs-api-${Environment}"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref ApiTaskDef
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Ref PrivateSubnet1Id
            - !Ref PrivateSubnet2Id
          SecurityGroups:
            - !Ref FargateSg
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: api
          ContainerPort: 8080
          TargetGroupArn: !Ref ALBTargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      HealthCheckGracePeriodSeconds: 60


  # ── EventBridge ───────────────────────────────────────────────────────────

  AggScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "ebs-aggregation-${Environment}"
      Description: Triggers EBS aggregator daily after SSM disk collection
      ScheduleExpression: !Ref AggregationSchedule
      State: ENABLED
      Targets:
        - Id: AggECSTask
          Arn: !GetAtt ECSCluster.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn
          EcsParameters:
            TaskDefinitionArn: !Ref AggTaskDef
            TaskCount: 1
            LaunchType: FARGATE
            NetworkConfiguration:
              AwsVpcConfiguration:
                Subnets:
                  - !Ref PrivateSubnet1Id
                  - !Ref PrivateSubnet2Id
                SecurityGroups:
                  - !Ref FargateSg
                AssignPublicIp: DISABLED
          Input: '{"source":"eventbridge"}'

  EcrPushRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "ebs-image-push-${Environment}"
      Description: Force new ECS deployment when a new image is pushed to the configured ECR repository
      EventPattern:
        source:
          - aws.ecr
        detail-type:
          - ECR Image Action
        resources:
          - !Ref ExistingEcrRepositoryArn
        detail:
          action-type:
            - PUSH
          image-tag:
            - !Ref DeployImageTag
          result:
            - SUCCESS
      Targets:
        - Id: ApiRedeploy
          Arn: !GetAtt EcrDeployFunction.Arn

  EcrPushLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref EcrDeployFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt EcrPushRule.Arn


Outputs:

  DashboardURL:
    Description: Dashboard URL — share with your team
    Value: !Sub "https://${DashboardDomain}"

  ALBDnsName:
    Description: ALB DNS — create a CNAME from DashboardDomain to this value
    Value: !GetAtt ALB.DNSName

  ECRRepositoryURI:
    Description: Existing ECR repo URI for docker build and push
    Value: !Ref ExistingEcrRepositoryUri

  ECSClusterName:
    Description: ECS cluster name
    Value: !Ref ECSCluster

  AggTaskDefArn:
    Description: Aggregator task definition ARN
    Value: !Ref AggTaskDef

  FargateSecurityGroupId:
    Description: Fargate security group ID
    Value: !Ref FargateSg

  CognitoUserPoolId:
    Description: Cognito User Pool ID — use to add team members
    Value: !Ref UserPool

  CognitoLoginURL:
    Description: Cognito hosted UI login page
    Value: !Sub "https://ebs-mon-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com/login"

  PrivateSubnets:
    Description: Private subnets used by Fargate tasks
    Value: !Sub "${PrivateSubnet1Id},${PrivateSubnet2Id}"
